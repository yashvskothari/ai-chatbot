<path d="M -95 -10&#10;C -95 -70, -35 -95, 15 -70&#10;C 65 -45, 55 5, 5 20&#10;C -45 35, -55 75, -5 90&#10;C 35 102, 75 70, 95 25" fill="none" stroke="url(#markGrad)" stroke-width="34" stroke-linecap="round" style="fill:none;color:rgb(11, 11, 11);stroke-width:34px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

