<svg width="100%" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" role="img" style="">
<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Abstract AI platform logo concept</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">A rounded square dark tile containing an abstract woven ribbon mark in a blue to violet to teal gradient, evoking flow and intelligence without literal brain, network, or sparkle imagery.</desc>
<defs>
<linearGradient id="tileBg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#0b0e1a"/>
<stop offset="100%" stop-color="#12162a"/>
</linearGradient>
<linearGradient id="markGrad" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#4f6bff"/>
<stop offset="50%" stop-color="#8a4fff"/>
<stop offset="100%" stop-color="#22c8b0"/>
</linearGradient>
<linearGradient id="markGrad2" x1="1" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#22c8b0"/>
<stop offset="100%" stop-color="#4f6bff"/>
</linearGradient>
<radialGradient id="glow" cx="50%" cy="42%" r="60%">
<stop offset="0%" stop-color="#5b6bff" stop-opacity="0.35"/>
<stop offset="100%" stop-color="#5b6bff" stop-opacity="0"/>
</radialGradient>
<linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#ffffff" stop-opacity="0.16"/>
<stop offset="35%" stop-color="#ffffff" stop-opacity="0"/>
</linearGradient>
<clipPath id="tileClip">
<rect x="140" y="20" width="400" height="380" rx="84"/>
</clipPath>
</defs>

<rect x="140" y="20" width="400" height="380" rx="84" fill="url(#tileBg)" style="stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<g clip-path="url(#tileClip)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
<rect x="140" y="20" width="400" height="380" fill="url(#glow)" style="stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

